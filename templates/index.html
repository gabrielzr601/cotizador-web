<!DOCTYPE html>
<html>
<head>
    <title>Cotizador</title>
</head>

<body>

<h2>Cotizador Profesional</h2>

<form method="POST">

    <h3>Company Info</h3>

    <input name="empresa" placeholder="Company" value="{{empresa}}">
    <input name="cliente" placeholder="Quote Subject" value="{{cliente}}">
    <textarea name="notas" placeholder="Notes">{{notas}}</textarea>

    <hr>

    <h3>Add Service</h3>

    <input name="servicio" placeholder="Service">
    <input name="desc" placeholder="Description">
    <input name="qty" placeholder="Qty">
    <input name="precio" placeholder="Price">

    <button type="submit" name="agregar">Add</button>

    <hr>

    <h3>Products</h3>

    <table border="1" width="100%">
        <tr>
            <th>Service</th>
            <th>Description</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
            <th>Action</th>
        </tr>

        {% for p in productos %}
        <tr>
            <td>{{p[0]}}</td>
            <td>{{p[1]}}</td>
            <td>{{p[2]}}</td>
            <td>{{p[3]}}</td>
            <td>{{p[4]}}</td>
            <td>
                <button type="submit" name="eliminar" value="{{loop.index0}}">X</button>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>

    <button type="submit" name="pdf">Generate PDF</button>
    <button type="submit" name="nuevo">New</button>

</form>

</body>
</html>
